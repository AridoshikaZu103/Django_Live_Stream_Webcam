<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Webcam Stream</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Prevent scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4; /* Beige background */
            color: #333; /* Dark text */
            font-family: 'Courier New', Courier, monospace; /* Monospaced font */
            text-align: center;
            padding-top: 20px;
        }
        .video-container {
            width: 400px; /* Smaller width */
            height: 300px; /* Smaller height */
            position: relative;
            border: 8px solid #ccc;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background-color: #e0e0e0;
            overflow: hidden;
        }
        .video-container img, .video-container video {
            position: absolute;
            top: 50px; /* Adjust to fit the smaller screen */
            left: 50px; /* Adjust to fit the smaller screen */
            width: 300px; /* Adjust to fit the smaller screen */
            height: 200px; /* Adjust to fit the smaller screen */
        }
        h1 {
            margin: 0;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', cursive; /* Pixelated font */
            font-weight: bold;
            color: #333;
        }
        .btn-custom {
            background-color: #007bff; /* Blue button */
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }
        .btn-custom:hover {
            background-color: #0056b3; /* Darker blue on hover */
        }
        h2 {
            font-family: 'Courier New', Courier, monospace;
            color: #333;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>🔴 Live Webcam Stream</h1>
    <div class="video-container">
        <video id="video" width="300" height="200" autoplay class="img-fluid" style="transform: scaleX(-1);"></video>
    </div>

    <div>
        <h2>Recording</h2>
        <button id="startBtn" class="btn-custom">Start Recording</button>
        <button id="stopBtn" class="btn-custom" disabled>Stop Recording</button>
        <button id="screenshotBtn" class="btn-custom">Screenshot</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let mediaRecorder;
        let recordedChunks = [];

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = function(event) {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = function() {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'recorded_video.mp4';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                };
            })
            .catch(error => {
                console.error('Error accessing webcam:', error);
            });

        document.getElementById('startBtn').addEventListener('click', function() {
            recordedChunks = [];
            mediaRecorder.start();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        });

        document.getElementById('stopBtn').addEventListener('click', function() {
            mediaRecorder.stop();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        });

        document.getElementById('screenshotBtn').addEventListener('click', function() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert the canvas to a data URL
            const dataURL = canvas.toDataURL('image/png');

            // Create a link to download the image
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'screenshot.png';
            link.click();
        });
    </script>
</body>
</html>
